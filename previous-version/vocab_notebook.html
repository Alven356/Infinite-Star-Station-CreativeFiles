<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Vocab Notebook</title>
  <style>
    :root {
      --bg: #f6f2ea;
      --paper: #fffaf0;
      --line: #ded5c7;
      --ink: #242424;
      --muted: #7b746a;
      --soft: #eee5d8;
      --accent: #2d2d2d;
      --danger: #9b2d2d;
      --ok: #2d6a3f;
    }

    * { box-sizing: border-box; }

    body {
      margin: 0;
      font-family: ui-serif, Georgia, "Times New Roman", "Noto Serif SC", serif;
      background: var(--bg);
      color: var(--ink);
    }

    button, input, textarea, select {
      font: inherit;
    }

    button {
      border: 1px solid var(--ink);
      background: transparent;
      color: var(--ink);
      padding: 7px 12px;
      cursor: pointer;
    }

    button:hover { background: var(--ink); color: var(--paper); }
    button:disabled { opacity: 0.35; cursor: not-allowed; }
    button:disabled:hover { background: transparent; color: var(--ink); }

    input, textarea, select {
      border: 1px solid var(--line);
      background: rgba(255,255,255,0.45);
      padding: 8px;
      outline: none;
      width: 100%;
    }

    textarea { resize: vertical; min-height: 48px; }

    .app {
      min-height: 100vh;
      display: grid;
      grid-template-rows: auto 1fr;
    }

    header {
      border-bottom: 1px solid var(--line);
      padding: 14px 18px;
      background: var(--paper);
      display: grid;
      gap: 10px;
    }

    .top-row {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 12px;
      flex-wrap: wrap;
    }

    h1 {
      margin: 0;
      font-size: 22px;
      letter-spacing: 0.04em;
      font-weight: 500;
    }

    .toolbar {
      display: flex;
      gap: 8px;
      flex-wrap: wrap;
    }

    .progress-wrap {
      display: grid;
      grid-template-columns: 1fr auto;
      align-items: center;
      gap: 12px;
    }

    .progress-bar {
      height: 12px;
      border: 1px solid var(--ink);
      background: transparent;
      overflow: hidden;
    }

    .progress-fill {
      height: 100%;
      width: 0%;
      background: var(--ink);
      transition: width 0.25s ease;
    }

    main {
      display: grid;
      grid-template-columns: 360px 1fr;
      min-height: 0;
    }

    aside {
      border-right: 1px solid var(--line);
      background: var(--paper);
      padding: 14px;
      overflow: auto;
    }

    .board {
      padding: 18px;
      overflow: auto;
      background-image: linear-gradient(var(--line) 1px, transparent 1px);
      background-size: 100% 32px;
    }

    .section-title {
      display: flex;
      justify-content: space-between;
      align-items: center;
      gap: 8px;
      margin-bottom: 10px;
    }

    .section-title h2 {
      margin: 0;
      font-size: 18px;
      font-weight: 500;
    }

    .tabs {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 8px;
      margin-bottom: 12px;
    }

    .tab.active { background: var(--ink); color: var(--paper); }

    .add-box, .test-controls, .result-box {
      border: 1px solid var(--line);
      padding: 12px;
      margin-bottom: 12px;
      background: rgba(255,255,255,0.25);
    }

    .form-grid { display: grid; gap: 8px; }

    .word-list { display: grid; gap: 8px; }

    .word-item {
      border-bottom: 1px solid var(--line);
      padding: 8px 4px;
      display: grid;
      grid-template-columns: 26px 1fr;
      gap: 8px;
      align-items: start;
    }

    .word-text { cursor: pointer; }
    .word-en { font-size: 17px; }
    .word-cn { color: var(--muted); margin-top: 3px; }
    .covered { background: var(--soft); color: transparent; user-select: none; }
    .tested .word-en { color: var(--muted); text-decoration: line-through; }

    .manual-selected {
      outline: 1px solid var(--ink);
      outline-offset: 2px;
    }

    .empty {
      color: var(--muted);
      padding: 20px 0;
      line-height: 1.8;
    }

    .cards {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(210px, 1fr));
      gap: 14px;
      align-items: start;
    }

    .card {
      border: 1px solid var(--ink);
      background: var(--paper);
      padding: 12px;
      min-height: 156px;
      display: grid;
      gap: 10px;
    }

    .card-word {
      font-size: 22px;
      border-bottom: 1px solid var(--line);
      padding-bottom: 6px;
    }

    .answer-reveal {
      color: var(--muted);
      border-top: 1px solid var(--line);
      padding-top: 8px;
    }

    .judge-row { display: grid; grid-template-columns: 1fr 1fr; gap: 8px; }
    .judge-row button.correct.active { background: var(--ok); color: white; border-color: var(--ok); }
    .judge-row button.wrong.active { background: var(--danger); color: white; border-color: var(--danger); }

    .board-actions {
      margin-top: 14px;
      display: flex;
      gap: 8px;
      flex-wrap: wrap;
    }

    .mode-label {
      font-size: 14px;
      color: var(--muted);
    }

    .result-list {
      display: grid;
      gap: 8px;
      margin-top: 10px;
    }

    .result-item {
      border-bottom: 1px solid var(--line);
      padding: 8px 0;
      display: grid;
      grid-template-columns: 1fr auto;
      gap: 12px;
      align-items: center;
    }

    .small { font-size: 13px; color: var(--muted); }

    @media (max-width: 820px) {
      main { grid-template-columns: 1fr; }
      aside { border-right: none; border-bottom: 1px solid var(--line); max-height: 48vh; }
    }
  </style>
</head>
<body>
  <div class="app">
    <header>
      <div class="top-row">
        <h1>Vocab Notebook</h1>
        <div class="toolbar">
          <button id="resetProgressBtn">重置当前库进度</button>
          <button id="exportBtn">导出存档</button>
          <label><button type="button" id="importBtn">导入存档</button><input id="importFile" type="file" accept=".json,application/json" hidden></label>
        </div>
      </div>
      <div class="progress-wrap">
        <div class="progress-bar"><div id="progressFill" class="progress-fill"></div></div>
        <div id="progressText">0 / 0</div>
      </div>
    </header>

    <main>
      <aside>
        <div class="tabs">
          <button id="libraryTab" class="tab active">单词库</button>
          <button id="wrongTab" class="tab">错题本</button>
        </div>

        <div class="section-title">
          <h2 id="libraryTitle">单词库</h2>
          <span id="wordCount" class="small"></span>
        </div>

        <div class="add-box">
          <div class="form-grid">
            <input id="enInput" placeholder="英文原词，例如 apple" />
            <input id="cnInput" placeholder="中文释义，例如 苹果" />
            <button id="addWordBtn">保存单词</button>
          </div>
        </div>

        <div class="test-controls">
          <div class="form-grid">
            <div class="mode-label">手动选词：勾选左侧未测试单词，然后开始。</div>
            <button id="manualStartBtn">开始手动测试</button>
            <div class="mode-label">随机总测试：从未测试单词里随机抽取。</div>
            <select id="randomSize">
              <option value="5">每组 5 个</option>
              <option value="10">每组 10 个</option>
              <option value="15">每组 15 个</option>
              <option value="20">每组 20 个</option>
            </select>
            <button id="randomStartBtn">开始随机测试</button>
          </div>
        </div>

        <div id="wordList" class="word-list"></div>
      </aside>

      <section class="board">
        <div id="boardContent" class="empty">先添加单词，然后从左侧选择一组，或者开始随机测试。</div>
      </section>
    </main>
  </div>

  <script>
    const STORAGE_KEY = 'vocab-notebook-save-v1';

    const state = loadState();
    let activeLibrary = 'library';
    let revealedId = null;
    let selectedIds = new Set();
    let currentTest = null;

    const $ = (id) => document.getElementById(id);

    function uid() {
      return 'w_' + Date.now().toString(36) + '_' + Math.random().toString(36).slice(2, 8);
    }

    function defaultState() {
      return {
        version: 1,
        library: [],
        wrongBook: [],
        sessions: {
          library: { testedIds: [], results: {} },
          wrongBook: { testedIds: [], results: {} }
        }
      };
    }

    function loadState() {
      try {
        const raw = localStorage.getItem(STORAGE_KEY);
        if (!raw) return defaultState();
        const parsed = JSON.parse(raw);
        return { ...defaultState(), ...parsed, sessions: { ...defaultState().sessions, ...(parsed.sessions || {}) } };
      } catch {
        return defaultState();
      }
    }

    function saveState() {
      localStorage.setItem(STORAGE_KEY, JSON.stringify(state));
    }

    function words() {
      return activeLibrary === 'library' ? state.library : state.wrongBook;
    }

    function session() {
      return state.sessions[activeLibrary];
    }

    function isTested(id) {
      return session().testedIds.includes(id);
    }

    function render() {
      renderTabs();
      renderProgress();
      renderWordList();
    }

    function renderTabs() {
      $('libraryTab').classList.toggle('active', activeLibrary === 'library');
      $('wrongTab').classList.toggle('active', activeLibrary === 'wrongBook');
      $('libraryTitle').textContent = activeLibrary === 'library' ? '单词库' : '错题本';
      $('wordCount').textContent = `${words().length} 个词`;
    }

    function renderProgress() {
      const total = words().length;
      const tested = session().testedIds.filter(id => words().some(w => w.id === id)).length;
      const percent = total ? Math.round(tested / total * 100) : 0;
      $('progressFill').style.width = percent + '%';
      $('progressText').textContent = `${tested} / ${total}`;
    }

    function renderWordList() {
      const list = $('wordList');
      list.innerHTML = '';
      if (!words().length) {
        list.innerHTML = '<div class="empty">这里还没有单词。</div>';
        return;
      }

      for (const word of words()) {
        const tested = isTested(word.id);
        const item = document.createElement('div');
        item.className = 'word-item' + (tested ? ' tested' : '') + (selectedIds.has(word.id) ? ' manual-selected' : '');

        const checkbox = document.createElement('input');
        checkbox.type = 'checkbox';
        checkbox.checked = selectedIds.has(word.id);
        checkbox.disabled = tested || currentTest;
        checkbox.addEventListener('change', () => {
          if (checkbox.checked) selectedIds.add(word.id);
          else selectedIds.delete(word.id);
          renderWordList();
        });

        const text = document.createElement('div');
        text.className = 'word-text';
        text.innerHTML = `
          <div class="word-en">${escapeHtml(word.en)}</div>
          <div class="word-cn ${revealedId === word.id ? '' : 'covered'}">${escapeHtml(word.cn)}</div>
        `;
        text.addEventListener('click', () => {
          revealedId = revealedId === word.id ? null : word.id;
          renderWordList();
        });

        item.appendChild(checkbox);
        item.appendChild(text);
        list.appendChild(item);
      }
    }

    function addWord() {
      const en = $('enInput').value.trim();
      const cn = $('cnInput').value.trim();
      if (!en || !cn) return alert('英文和中文释义都要填写。');
      words().push({ id: uid(), en, cn });
      $('enInput').value = '';
      $('cnInput').value = '';
      saveState();
      render();
    }

    function startManualTest() {
      const picked = [...selectedIds].map(id => words().find(w => w.id === id)).filter(Boolean);
      if (!picked.length) return alert('先勾选一些未测试单词。');
      startTest('manual', picked);
    }

    function startRandomTest() {
      const size = Number($('randomSize').value);
      const pool = words().filter(w => !isTested(w.id));
      if (!pool.length) return showFinalResult();
      const shuffled = [...pool].sort(() => Math.random() - 0.5);
      startTest('random', shuffled.slice(0, size));
    }

    function startTest(mode, picked) {
      currentTest = {
        source: activeLibrary,
        mode,
        ids: picked.map(w => w.id),
        answers: {},
        locked: false,
        judgements: {}
      };
      selectedIds.clear();
      revealedId = null;
      render();
      renderTestBoard();
    }

    function renderTestBoard() {
      const board = $('boardContent');
      const testWords = currentTest.ids.map(id => getWordById(currentTest.source, id)).filter(Boolean);
      board.className = '';
      board.innerHTML = `
        <div class="section-title">
          <h2>${currentTest.mode === 'manual' ? '手动测试' : '随机测试'}</h2>
          <span class="small">${currentTest.source === 'library' ? '单词库' : '错题本'} · ${testWords.length} 个词</span>
        </div>
        <div class="cards"></div>
        <div class="board-actions"></div>
      `;

      const cards = board.querySelector('.cards');
      for (const word of testWords) {
        const card = document.createElement('div');
        card.className = 'card';
        const value = currentTest.answers[word.id] || '';
        const judgement = currentTest.judgements[word.id];
        card.innerHTML = `
          <div class="card-word">${escapeHtml(word.en)}</div>
          <textarea data-answer="${word.id}" ${currentTest.locked ? 'disabled' : ''} placeholder="写中文释义">${escapeHtml(value)}</textarea>
          ${currentTest.locked ? `<div class="answer-reveal">答案：${escapeHtml(word.cn)}</div>
          <div class="judge-row">
            <button class="correct ${judgement === 'correct' ? 'active' : ''}" data-judge="correct" data-id="${word.id}">正确</button>
            <button class="wrong ${judgement === 'wrong' ? 'active' : ''}" data-judge="wrong" data-id="${word.id}">错误</button>
          </div>` : ''}
        `;
        cards.appendChild(card);
      }

      board.querySelectorAll('[data-answer]').forEach(area => {
        area.addEventListener('input', () => {
          currentTest.answers[area.dataset.answer] = area.value;
        });
      });

      board.querySelectorAll('[data-judge]').forEach(btn => {
        btn.addEventListener('click', () => {
          currentTest.judgements[btn.dataset.id] = btn.dataset.judge;
          renderTestBoard();
        });
      });

      const actions = board.querySelector('.board-actions');
      if (!currentTest.locked) {
        actions.innerHTML = '<button id="submitTestBtn">提交并锁定</button><button id="cancelTestBtn">取消</button>';
        $('submitTestBtn').addEventListener('click', lockTest);
        $('cancelTestBtn').addEventListener('click', cancelTest);
      } else {
        actions.innerHTML = '<button id="finishTestBtn">确认判分</button>';
        $('finishTestBtn').addEventListener('click', finishTest);
      }
    }

    function lockTest() {
      currentTest.locked = true;
      renderTestBoard();
    }

    function cancelTest() {
      currentTest = null;
      $('boardContent').className = 'empty';
      $('boardContent').textContent = '测试已取消。';
      render();
    }

    function finishTest() {
      const missing = currentTest.ids.filter(id => !currentTest.judgements[id]);
      if (missing.length) return alert('每个单词都需要选择正确或错误。');
      const s = state.sessions[currentTest.source];
      for (const id of currentTest.ids) {
        if (!s.testedIds.includes(id)) s.testedIds.push(id);
        s.results[id] = currentTest.judgements[id];
      }
      currentTest = null;
      saveState();
      render();

      const total = words().length;
      const tested = session().testedIds.filter(id => words().some(w => w.id === id)).length;
      if (total && tested >= total) showFinalResult();
      else {
        $('boardContent').className = 'empty';
        $('boardContent').textContent = '这一组完成了。可以继续选择下一组，或者继续随机测试。';
      }
    }

    function showFinalResult() {
      const ws = words();
      const s = session();
      const testedWords = ws.filter(w => s.testedIds.includes(w.id));
      const wrongWords = testedWords.filter(w => s.results[w.id] === 'wrong');
      const correctCount = testedWords.filter(w => s.results[w.id] === 'correct').length;
      const rate = testedWords.length ? Math.round(correctCount / testedWords.length * 100) : 0;

      const board = $('boardContent');
      board.className = 'result-box';
      board.innerHTML = `
        <h2>测试完成</h2>
        <p>总数：${testedWords.length}</p>
        <p>正确：${correctCount}</p>
        <p>错误：${wrongWords.length}</p>
        <p>正确率：${rate}%</p>
        <h3>不认识 / 错误的单词</h3>
        <div class="result-list"></div>
      `;
      const list = board.querySelector('.result-list');
      if (!wrongWords.length) {
        list.innerHTML = '<div class="empty">没有错词。</div>';
        return;
      }
      for (const word of wrongWords) {
        const exists = state.wrongBook.some(w => w.en === word.en && w.cn === word.cn);
        const item = document.createElement('div');
        item.className = 'result-item';
        item.innerHTML = `
          <div><strong>${escapeHtml(word.en)}</strong><div class="small">${escapeHtml(word.cn)}</div></div>
          <button data-bookmark="${word.id}" ${exists ? 'disabled' : ''}>${exists ? '已在错题本' : '加入错题本'}</button>
        `;
        list.appendChild(item);
      }
      board.querySelectorAll('[data-bookmark]').forEach(btn => {
        btn.addEventListener('click', () => {
          const word = ws.find(w => w.id === btn.dataset.bookmark);
          if (!word) return;
          if (!state.wrongBook.some(w => w.en === word.en && w.cn === word.cn)) {
            state.wrongBook.push({ id: uid(), en: word.en, cn: word.cn });
            saveState();
            showFinalResult();
            render();
          }
        });
      });
    }

    function getWordById(source, id) {
      const arr = source === 'library' ? state.library : state.wrongBook;
      return arr.find(w => w.id === id);
    }

    function switchLibrary(lib) {
      activeLibrary = lib;
      selectedIds.clear();
      revealedId = null;
      currentTest = null;
      $('boardContent').className = 'empty';
      $('boardContent').textContent = lib === 'library' ? '当前是单词库。' : '当前是错题本。';
      render();
    }

    function resetProgress() {
      if (!confirm('确定重置当前库的测试进度吗？单词不会删除。')) return;
      state.sessions[activeLibrary] = { testedIds: [], results: {} };
      selectedIds.clear();
      saveState();
      render();
      $('boardContent').className = 'empty';
      $('boardContent').textContent = '当前库的测试进度已经重置。';
    }

    function exportSave() {
      const blob = new Blob([JSON.stringify(state, null, 2)], { type: 'application/json' });
      const url = URL.createObjectURL(blob);
      const a = document.createElement('a');
      a.href = url;
      a.download = 'vocab-notebook-save.json';
      a.click();
      URL.revokeObjectURL(url);
    }

    function importSave(file) {
      const reader = new FileReader();
      reader.onload = () => {
        try {
          const parsed = JSON.parse(reader.result);
          if (!parsed.library || !parsed.wrongBook) throw new Error('bad file');
          Object.assign(state, defaultState(), parsed);
          saveState();
          selectedIds.clear();
          revealedId = null;
          currentTest = null;
          render();
          $('boardContent').className = 'empty';
          $('boardContent').textContent = '存档已经导入。';
        } catch {
          alert('这个存档文件无法读取。');
        }
      };
      reader.readAsText(file);
    }

    function escapeHtml(text) {
      return String(text).replace(/[&<>'"]/g, ch => ({
        '&': '&amp;', '<': '&lt;', '>': '&gt;', "'": '&#39;', '"': '&quot;'
      }[ch]));
    }

    $('addWordBtn').addEventListener('click', addWord);
    $('manualStartBtn').addEventListener('click', startManualTest);
    $('randomStartBtn').addEventListener('click', startRandomTest);
    $('libraryTab').addEventListener('click', () => switchLibrary('library'));
    $('wrongTab').addEventListener('click', () => switchLibrary('wrongBook'));
    $('resetProgressBtn').addEventListener('click', resetProgress);
    $('exportBtn').addEventListener('click', exportSave);
    $('importBtn').addEventListener('click', () => $('importFile').click());
    $('importFile').addEventListener('change', (e) => {
      if (e.target.files[0]) importSave(e.target.files[0]);
      e.target.value = '';
    });

    render();
  </script>
</body>
</html>
