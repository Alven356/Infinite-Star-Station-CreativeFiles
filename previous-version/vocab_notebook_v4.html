<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Vocab Notebook v4</title>
  <style>
    :root {
      --bg: #f6f2ea; --paper: #fffaf0; --line: #ded5c7; --ink: #242424;
      --muted: #7b746a; --soft: #eee5d8; --danger: #9b2d2d; --ok: #2d6a3f;
    }
    * { box-sizing: border-box; }
    body { margin: 0; font-family: ui-serif, Georgia, "Times New Roman", "Noto Serif SC", serif; background: var(--bg); color: var(--ink); }
    button, input, textarea, select { font: inherit; }
    button { border: 1px solid var(--ink); background: transparent; color: var(--ink); padding: 7px 12px; cursor: pointer; }
    button:hover { background: var(--ink); color: var(--paper); }
    button:disabled { opacity: .35; cursor: not-allowed; }
    button:disabled:hover { background: transparent; color: var(--ink); }
    input, textarea, select { border: 1px solid var(--line); background: rgba(255,255,255,.45); padding: 8px; outline: none; width: 100%; }
    textarea { resize: vertical; min-height: 48px; }
    .app { min-height: 100vh; display: grid; grid-template-rows: auto 1fr; }
    header { border-bottom: 1px solid var(--line); padding: 14px 18px; background: var(--paper); display: grid; gap: 10px; }
    .top-row { display:flex; align-items:center; justify-content:space-between; gap:12px; flex-wrap:wrap; }
    h1 { margin:0; font-size:22px; letter-spacing:.04em; font-weight:500; }
    .toolbar, .inline-actions, .board-actions { display:flex; gap:8px; flex-wrap:wrap; }
    .progress-wrap { display:grid; grid-template-columns:1fr auto; align-items:center; gap:12px; }
    .progress-bar { height:12px; border:1px solid var(--ink); background:transparent; overflow:hidden; }
    .progress-fill { height:100%; width:0%; background:var(--ink); transition:width .25s ease; }
    main { display:grid; grid-template-columns:380px 1fr; min-height:0; }
    aside { border-right:1px solid var(--line); background:var(--paper); padding:14px; overflow:auto; }
    .board { padding:18px; overflow:auto; background-image:linear-gradient(var(--line) 1px, transparent 1px); background-size:100% 32px; }
    .section-title { display:flex; justify-content:space-between; align-items:center; gap:8px; margin-bottom:10px; }
    .section-title h2 { margin:0; font-size:18px; font-weight:500; }
    .tabs { display:grid; grid-template-columns:1fr 1fr; gap:8px; margin-bottom:12px; }
    .tab.active { background:var(--ink); color:var(--paper); }
    .add-box, .test-controls, .result-box, .library-box { border:1px solid var(--line); padding:12px; margin-bottom:12px; background:rgba(255,255,255,.25); }
    .form-grid { display:grid; gap:8px; }
    .two { display:grid; grid-template-columns:1fr auto; gap:8px; align-items:center; }
    .word-list { display:grid; gap:8px; }
    .word-item { border-bottom:1px solid var(--line); padding:8px 4px; display:grid; grid-template-columns:26px 1fr auto; gap:8px; align-items:start; }
    .word-text { cursor:pointer; }
    .word-en { font-size:17px; }
    .word-cn { color:var(--muted); margin-top:3px; }
    .covered { background:var(--soft); color:transparent; user-select:none; }
    .tested .word-en { color:var(--muted); text-decoration:line-through; }
    .manual-selected { outline:1px solid var(--ink); outline-offset:2px; }
    .empty { color:var(--muted); padding:20px 0; line-height:1.8; }
    .cards { display:grid; grid-template-columns:repeat(auto-fit, minmax(210px, 1fr)); gap:14px; align-items:start; }
    .cards.scatter { display:block; position:relative; min-height:var(--scatter-height, 520px); }
    .cards.scatter .card { position:absolute; width:min(230px, calc(100% - 20px)); transform:translateX(-50%); }
    .card { border:1px solid var(--ink); background:var(--paper); padding:12px; min-height:156px; display:grid; gap:10px; }
    .card-word { font-size:22px; border-bottom:1px solid var(--line); padding-bottom:6px; }
    .answer-reveal { color:var(--muted); border-top:1px solid var(--line); padding-top:8px; }
    .judge-row { display:grid; grid-template-columns:1fr 1fr; gap:8px; }
    .judge-row button.correct.active { background:var(--ok); color:white; border-color:var(--ok); }
    .judge-row button.wrong.active { background:var(--danger); color:white; border-color:var(--danger); }
    .mode-label, .small { font-size:13px; color:var(--muted); }
    .result-list { display:grid; gap:8px; margin-top:10px; }
    .result-item { border-bottom:1px solid var(--line); padding:8px 0; display:grid; grid-template-columns:1fr auto; gap:12px; align-items:center; }
    .mini-btn { padding:4px 7px; font-size:13px; border-color:var(--line); }
    .word-actions { display:flex; gap:5px; align-items:start; }
    .batch-box { display:none; border-top:1px solid var(--line); margin-top:10px; padding-top:10px; }
    .batch-box.open { display:grid; gap:8px; }
    .batch-box textarea { min-height:120px; }
    .editor-box { border:1px solid var(--ink); background:var(--paper); padding:14px; max-width:600px; display:grid; gap:10px; }
    @media (max-width: 860px) { main { grid-template-columns:1fr; } aside { border-right:none; border-bottom:1px solid var(--line); max-height:52vh; } .cards.scatter { display:grid; min-height:auto; } .cards.scatter .card { position:static; width:auto; transform:none; } }
  </style>
</head>
<body>
<div class="app">
  <header>
    <div class="top-row">
      <h1>Vocab Notebook</h1>
      <div class="toolbar">
        <button id="resetProgressBtn">重置当前范围进度</button>
        <button id="exportBtn">导出存档</button>
        <label><button type="button" id="importBtn">导入存档</button><input id="importFile" type="file" accept=".json,application/json" hidden></label>
      </div>
    </div>
    <div class="progress-wrap"><div class="progress-bar"><div id="progressFill" class="progress-fill"></div></div><div id="progressText">0 / 0</div></div>
  </header>
  <main>
    <aside>
      <div class="tabs"><button id="libraryTab" class="tab active">单词库</button><button id="wrongTab" class="tab">错题本</button></div>

      <div id="multiLibraryBox" class="library-box">
        <div class="form-grid">
          <div class="small">多词库</div>
          <select id="librarySelect"></select>
          <div class="inline-actions">
            <button id="newLibraryBtn" type="button">新建词库</button>
            <button id="renameLibraryBtn" type="button">重命名</button>
            <button id="deleteLibraryBtn" type="button">删除词库</button>
          </div>
        </div>
      </div>

      <div class="section-title"><h2 id="libraryTitle">单词库</h2><span id="wordCount" class="small"></span></div>

      <div class="add-box">
        <div class="form-grid">
          <input id="enInput" placeholder="英文原词，例如 apple" />
          <input id="cnInput" placeholder="中文释义，例如 苹果" />
          <button id="addWordBtn">保存单词</button>
          <button id="toggleBatchBtn" type="button">批量导入</button>
        </div>
        <div id="batchBox" class="batch-box">
          <div class="small">每行一个单词。推荐格式：英文 = 中文。也支持 Tab、逗号、中文逗号。</div>
          <textarea id="batchInput" placeholder="apple = 苹果&#10;orange = 橙子&#10;make a decision = 做决定"></textarea>
          <div class="inline-actions"><button id="batchImportBtn" type="button">导入到当前范围</button><button id="batchClearBtn" type="button">清空输入</button></div>
        </div>
      </div>

      <div class="test-controls">
        <div class="form-grid">
          <div class="mode-label">排序</div>
          <select id="sortSelect">
            <option value="created">添加顺序</option>
            <option value="enAZ">英文 A → Z</option>
            <option value="enZA">英文 Z → A</option>
            <option value="cnAZ">中文 A → Z</option>
            <option value="untestedFirst">未测试优先</option>
            <option value="testedFirst">已测试优先</option>
          </select>
          <div class="mode-label">测试板布局</div>
          <select id="layoutSelect">
            <option value="scatter">随机分散</option>
            <option value="grid">整齐排列</option>
          </select>
          <div class="mode-label">手动选词：勾选左侧未测试单词，然后开始。</div>
          <button id="manualStartBtn">开始手动测试</button>
          <div class="mode-label">随机总测试：从未测试单词里随机抽取。每组数量可以自定义。</div>
          <div class="two"><input id="randomSize" type="number" min="1" max="100" value="10" /><span class="small">个/组</span></div>
          <button id="randomStartBtn">开始随机测试</button>
        </div>
      </div>
      <div id="wordList" class="word-list"></div>
    </aside>
    <section class="board"><div id="boardContent" class="empty">先添加单词，然后从左侧选择一组，或者开始随机测试。</div></section>
  </main>
</div>
<script>
const STORAGE_KEY = 'vocab-notebook-save-v4';
const OLD_KEYS = ['vocab-notebook-save-v3','vocab-notebook-save-v1'];
let state = loadState();
let activeScope = 'library'; // library or wrongBook
let revealedId = null, selectedIds = new Set(), currentTest = null, editingWord = null, batchOpen = false;
const $ = id => document.getElementById(id);
function uid(){ return 'w_' + Date.now().toString(36) + '_' + Math.random().toString(36).slice(2,8); }
function defaultState(){
  const libId = 'lib_default';
  return { version:4, activeLibraryId:libId, libraries:[{id:libId, name:'默认词库', words:[]}], wrongBook:[], sessions:{ [libId]:{testedIds:[], results:{}}, wrongBook:{testedIds:[], results:{}} }, sortMode:'created', boardLayout:'scatter' };
}
function migrate(parsed){
  const base = defaultState();
  if (!parsed || typeof parsed !== 'object') return base;
  if (Array.isArray(parsed.libraries)) {
    const merged = {...base, ...parsed};
    merged.libraries = parsed.libraries.length ? parsed.libraries.map((l,i)=>({id:l.id||('lib_'+uid()), name:l.name||('词库 '+(i+1)), words:Array.isArray(l.words)?l.words:[]})) : base.libraries;
    merged.activeLibraryId = merged.libraries.some(l=>l.id===parsed.activeLibraryId) ? parsed.activeLibraryId : merged.libraries[0].id;
    merged.wrongBook = Array.isArray(parsed.wrongBook) ? parsed.wrongBook : [];
    merged.sessions = {...base.sessions, ...(parsed.sessions||{})};
    for (const lib of merged.libraries) if (!merged.sessions[lib.id]) merged.sessions[lib.id] = {testedIds:[], results:{}};
    if (!merged.sessions.wrongBook) merged.sessions.wrongBook = {testedIds:[], results:{}};
    merged.boardLayout = parsed.boardLayout || 'scatter';
    merged.version = 4; return merged;
  }
  // v1/v2 migration: old library array becomes default library
  base.libraries[0].words = Array.isArray(parsed.library) ? parsed.library : [];
  base.wrongBook = Array.isArray(parsed.wrongBook) ? parsed.wrongBook : [];
  const oldSessions = parsed.sessions || {};
  base.sessions[base.activeLibraryId] = oldSessions.library || {testedIds:[], results:{}};
  base.sessions.wrongBook = oldSessions.wrongBook || {testedIds:[], results:{}};
  base.boardLayout = parsed.boardLayout || 'scatter';
  base.version = 4;
  return base;
}
function loadState(){
  try{
    let raw = localStorage.getItem(STORAGE_KEY);
    if (!raw) for (const k of OLD_KEYS) { raw = localStorage.getItem(k); if (raw) break; }
    if (!raw) return defaultState();
    return migrate(JSON.parse(raw));
  } catch { return defaultState(); }
}
function saveState(){ localStorage.setItem(STORAGE_KEY, JSON.stringify(state)); }
function activeLibrary(){ return state.libraries.find(l=>l.id===state.activeLibraryId) || state.libraries[0]; }
function scopeKey(){ return activeScope === 'wrongBook' ? 'wrongBook' : activeLibrary().id; }
function words(){ return activeScope === 'wrongBook' ? state.wrongBook : activeLibrary().words; }
function session(){ const key = scopeKey(); if(!state.sessions[key]) state.sessions[key]={testedIds:[], results:{}}; return state.sessions[key]; }
function isTested(id){ return session().testedIds.includes(id); }
function sortedWords(){
  const arr = [...words()]; const mode = state.sortMode || 'created';
  const coll = new Intl.Collator('zh-Hans-CN');
  if(mode==='enAZ') arr.sort((a,b)=>a.en.localeCompare(b.en, undefined, {sensitivity:'base'}));
  if(mode==='enZA') arr.sort((a,b)=>b.en.localeCompare(a.en, undefined, {sensitivity:'base'}));
  if(mode==='cnAZ') arr.sort((a,b)=>coll.compare(a.cn,b.cn));
  if(mode==='untestedFirst') arr.sort((a,b)=>Number(isTested(a.id))-Number(isTested(b.id)) || a.en.localeCompare(b.en));
  if(mode==='testedFirst') arr.sort((a,b)=>Number(isTested(b.id))-Number(isTested(a.id)) || a.en.localeCompare(b.en));
  return arr;
}
function render(){ renderTabs(); renderLibraries(); renderProgress(); renderWordList(); if($('layoutSelect')) $('layoutSelect').value=state.boardLayout||'scatter'; }
function renderTabs(){
  $('libraryTab').classList.toggle('active', activeScope==='library'); $('wrongTab').classList.toggle('active', activeScope==='wrongBook');
  $('multiLibraryBox').style.display = activeScope==='library' ? 'block' : 'none';
  $('libraryTitle').textContent = activeScope==='library' ? activeLibrary().name : '错题本';
  $('wordCount').textContent = `${words().length} 个词`;
}
function renderLibraries(){
  const sel=$('librarySelect'); sel.innerHTML='';
  for(const lib of state.libraries){ const o=document.createElement('option'); o.value=lib.id; o.textContent=lib.name; o.selected=lib.id===state.activeLibraryId; sel.appendChild(o); }
  $('deleteLibraryBtn').disabled = state.libraries.length <= 1 || currentTest;
  $('renameLibraryBtn').disabled = !!currentTest; $('newLibraryBtn').disabled = !!currentTest;
}
function renderProgress(){
  const total=words().length; const tested=session().testedIds.filter(id=>words().some(w=>w.id===id)).length; const percent=total?Math.round(tested/total*100):0;
  $('progressFill').style.width=percent+'%'; $('progressText').textContent=`${tested} / ${total}`;
}
function renderWordList(){
  const list=$('wordList'); list.innerHTML=''; $('sortSelect').value=state.sortMode||'created';
  if(!words().length){ list.innerHTML='<div class="empty">这里还没有单词。</div>'; return; }
  for(const word of sortedWords()){
    const tested=isTested(word.id); const item=document.createElement('div');
    item.className='word-item'+(tested?' tested':'')+(selectedIds.has(word.id)?' manual-selected':'');
    const cb=document.createElement('input'); cb.type='checkbox'; cb.checked=selectedIds.has(word.id); cb.disabled=tested||currentTest; cb.title=tested?'这个词已经测试过，不能再次选择':'选择这个词进行手动测试';
    cb.addEventListener('change',()=>{ cb.checked?selectedIds.add(word.id):selectedIds.delete(word.id); renderWordList(); });
    const text=document.createElement('div'); text.className='word-text'; text.innerHTML=`<div class="word-en">${escapeHtml(word.en)}</div><div class="word-cn ${revealedId===word.id?'':'covered'}">${escapeHtml(word.cn)}</div>`;
    text.addEventListener('click',()=>{ revealedId = revealedId===word.id ? null : word.id; renderWordList(); });
    const actions=document.createElement('div'); actions.className='word-actions'; actions.innerHTML=`<button class="mini-btn" data-edit="${word.id}" ${currentTest?'disabled':''}>编辑</button>`;
    actions.querySelector('[data-edit]').addEventListener('click',()=>openEditor(word.id));
    item.append(cb,text,actions); list.appendChild(item);
  }
}
function addWord(){ const en=$('enInput').value.trim(), cn=$('cnInput').value.trim(); if(!en||!cn) return alert('英文和中文释义都要填写。'); words().push({id:uid(),en,cn}); $('enInput').value=''; $('cnInput').value=''; saveState(); render(); }
function toggleBatch(){ batchOpen=!batchOpen; $('batchBox').classList.toggle('open',batchOpen); }
function parseBatchText(text){
  const lines=text.split(/\r?\n/).map(l=>l.trim()).filter(Boolean), parsed=[], failed=[];
  for(const line of lines){ let parts=null; for(const sep of ['=','\t','，',',',' - ','：',':']) if(line.includes(sep)){ parts=line.split(sep); break; }
    if(!parts||parts.length<2){ const m=line.match(/^(.+?)\s+([\u4e00-\u9fff].*)$/); if(m) parts=[m[1],m[2]]; }
    if(!parts||parts.length<2){ failed.push(line); continue; }
    const en=parts[0].trim(), cn=parts.slice(1).join('=').trim(); if(en&&cn) parsed.push({en,cn}); else failed.push(line);
  } return {parsed, failed};
}
function batchImport(){
  const text=$('batchInput').value.trim(); if(!text) return alert('先粘贴一些单词。'); const {parsed,failed}=parseBatchText(text); if(!parsed.length) return alert('没有识别出可导入的单词。推荐格式：apple = 苹果');
  let added=0, skipped=0; const arr=words();
  for(const item of parsed){ const exists=arr.some(w=>w.en.trim().toLowerCase()===item.en.trim().toLowerCase() && w.cn.trim()===item.cn.trim()); if(exists){skipped++; continue;} arr.push({id:uid(), en:item.en, cn:item.cn}); added++; }
  saveState(); render(); showMsg(`批量导入完成：新增 ${added} 个，跳过重复 ${skipped} 个${failed.length?`，未识别 ${failed.length} 行`:''}。`);
}
function openEditor(id){
  const word=words().find(w=>w.id===id); if(!word) return; editingWord={key:scopeKey(), id};
  const board=$('boardContent'); board.className=''; board.innerHTML=`<div class="editor-box"><h2 style="margin:0;font-weight:500;">编辑单词</h2><div class="small">编辑不会重置测试记录。删除会同时清掉这个词的测试记录。</div><input id="editEnInput" value="${escapeHtml(word.en)}" placeholder="英文原词"><input id="editCnInput" value="${escapeHtml(word.cn)}" placeholder="中文释义"><div class="inline-actions"><button id="saveEditBtn">保存修改</button><button id="cancelEditBtn">取消</button><button id="deleteWordBtn">删除单词</button></div></div>`;
  $('saveEditBtn').onclick=saveEdit; $('cancelEditBtn').onclick=()=>{editingWord=null; showMsg('编辑已取消。')}; $('deleteWordBtn').onclick=deleteEditingWord;
}
function arrByKey(key){ if(key==='wrongBook') return state.wrongBook; const lib=state.libraries.find(l=>l.id===key); return lib?lib.words:[]; }
function saveEdit(){ if(!editingWord) return; const arr=arrByKey(editingWord.key); const word=arr.find(w=>w.id===editingWord.id); if(!word) return; const en=$('editEnInput').value.trim(), cn=$('editCnInput').value.trim(); if(!en||!cn) return alert('英文和中文释义都要填写。'); word.en=en; word.cn=cn; saveState(); render(); editingWord=null; showMsg('单词已经修改。'); }
function deleteEditingWord(){ if(!editingWord||!confirm('确定删除这个单词吗？')) return; const arr=arrByKey(editingWord.key); const idx=arr.findIndex(w=>w.id===editingWord.id); if(idx>=0) arr.splice(idx,1); const s=state.sessions[editingWord.key]; if(s){ s.testedIds=s.testedIds.filter(id=>id!==editingWord.id); delete s.results[editingWord.id]; } selectedIds.delete(editingWord.id); if(revealedId===editingWord.id) revealedId=null; saveState(); render(); editingWord=null; showMsg('单词已经删除。'); }
function startManualTest(){ const picked=[...selectedIds].map(id=>words().find(w=>w.id===id)).filter(Boolean); if(!picked.length) return alert('先勾选一些未测试单词。'); startTest('manual',picked); }
function startRandomTest(){ let size=Number($('randomSize').value); if(!Number.isFinite(size)||size<1) size=1; size=Math.min(size,100); $('randomSize').value=size; const pool=words().filter(w=>!isTested(w.id)); if(!pool.length) return showFinalResult(); const shuffled=[...pool].sort(()=>Math.random()-.5); startTest('random',shuffled.slice(0,Math.min(size,shuffled.length))); }
function startTest(mode,picked){ const ids=picked.map(w=>w.id); currentTest={key:scopeKey(), label:activeScope==='library'?activeLibrary().name:'错题本', mode, ids, answers:{}, locked:false, judgements:{}, layout:state.boardLayout||'scatter', positions:{}}; currentTest.positions=makeScatterPositions(ids); selectedIds.clear(); revealedId=null; render(); renderTestBoard(); }
function makeScatterPositions(ids){
  const n=ids.length, cols=Math.min(4, Math.max(1, Math.ceil(Math.sqrt(n)))), rows=Math.ceil(n/cols);
  const cells=[]; for(let r=0;r<rows;r++) for(let c=0;c<cols;c++) cells.push({r,c});
  cells.sort(()=>Math.random()-.5);
  const positions={};
  ids.forEach((id,i)=>{ const cell=cells[i]; const x=((cell.c+.5)/cols*100)+(Math.random()*6-3); const y=cell.r*205+Math.round(Math.random()*38); positions[id]={left:Math.max(12,Math.min(88,x)), top:y}; });
  return {items:positions, height:Math.max(430, rows*205+190)};
}
function renderTestBoard(){
  const board=$('boardContent'); const testWords=currentTest.ids.map(id=>arrByKey(currentTest.key).find(w=>w.id===id)).filter(Boolean);
  const isScatter=(currentTest.layout||state.boardLayout)==='scatter';
  board.className=''; board.innerHTML=`<div class="section-title"><h2>${currentTest.mode==='manual'?'手动测试':'随机测试'}</h2><span class="small">${escapeHtml(currentTest.label)} · ${testWords.length} 个词 · ${isScatter?'随机分散':'整齐排列'}</span></div><div class="cards ${isScatter?'scatter':''}"></div><div class="board-actions"></div>`;
  const cards=board.querySelector('.cards');
  if(isScatter){ if(!currentTest.positions||!currentTest.positions.items) currentTest.positions=makeScatterPositions(currentTest.ids); cards.style.setProperty('--scatter-height',(currentTest.positions.height||520)+'px'); }
  for(const word of testWords){ const value=currentTest.answers[word.id]||'', judge=currentTest.judgements[word.id]; const card=document.createElement('div'); card.className='card';
    if(isScatter){ const pos=currentTest.positions.items[word.id]||{left:50,top:0}; card.style.left=pos.left+'%'; card.style.top=pos.top+'px'; }
    card.innerHTML=`<div class="card-word">${escapeHtml(word.en)}</div><textarea data-answer="${word.id}" ${currentTest.locked?'disabled':''} placeholder="写中文释义">${escapeHtml(value)}</textarea>${currentTest.locked?`<div class="answer-reveal">答案：${escapeHtml(word.cn)}</div><div class="judge-row"><button class="correct ${judge==='correct'?'active':''}" data-judge="correct" data-id="${word.id}">正确</button><button class="wrong ${judge==='wrong'?'active':''}" data-judge="wrong" data-id="${word.id}">错误</button></div>`:''}`;
    cards.appendChild(card);
  }
  board.querySelectorAll('[data-answer]').forEach(a=>a.oninput=()=>{currentTest.answers[a.dataset.answer]=a.value});
  board.querySelectorAll('[data-judge]').forEach(b=>b.onclick=()=>{currentTest.judgements[b.dataset.id]=b.dataset.judge; renderTestBoard();});
  const actions=board.querySelector('.board-actions');
  if(!currentTest.locked){ actions.innerHTML='<button id="submitTestBtn">提交并锁定</button><button id="reshuffleBtn">重新分散</button><button id="cancelTestBtn">取消</button>'; $('submitTestBtn').onclick=()=>{currentTest.locked=true; renderTestBoard();}; $('reshuffleBtn').onclick=()=>{currentTest.positions=makeScatterPositions(currentTest.ids); renderTestBoard();}; $('cancelTestBtn').onclick=cancelTest; }
  else { actions.innerHTML='<button id="finishTestBtn">确认判分</button>'; $('finishTestBtn').onclick=finishTest; }
}
function cancelTest(){ currentTest=null; editingWord=null; showMsg('测试已取消。'); render(); }
function finishTest(){ const missing=currentTest.ids.filter(id=>!currentTest.judgements[id]); if(missing.length) return alert('每个单词都需要选择正确或错误。'); const s=state.sessions[currentTest.key]||(state.sessions[currentTest.key]={testedIds:[],results:{}}); for(const id of currentTest.ids){ if(!s.testedIds.includes(id)) s.testedIds.push(id); s.results[id]=currentTest.judgements[id]; } currentTest=null; saveState(); render(); const total=words().length, tested=session().testedIds.filter(id=>words().some(w=>w.id===id)).length; if(total&&tested>=total) showFinalResult(); else showMsg('这一组完成了。可以继续选择下一组，或者继续随机测试。'); }
function showFinalResult(){ const ws=words(), s=session(); const testedWords=ws.filter(w=>s.testedIds.includes(w.id)); const wrongWords=testedWords.filter(w=>s.results[w.id]==='wrong'); const correctCount=testedWords.filter(w=>s.results[w.id]==='correct').length; const rate=testedWords.length?Math.round(correctCount/testedWords.length*100):0; const board=$('boardContent'); board.className='result-box'; board.innerHTML=`<h2>测试完成</h2><p>范围：${escapeHtml(activeScope==='library'?activeLibrary().name:'错题本')}</p><p>总数：${testedWords.length}</p><p>正确：${correctCount}</p><p>错误：${wrongWords.length}</p><p>正确率：${rate}%</p><h3>不认识 / 错误的单词</h3><div class="result-list"></div>`; const list=board.querySelector('.result-list'); if(!wrongWords.length){ list.innerHTML='<div class="empty">没有错词。</div>'; return; } for(const word of wrongWords){ const exists=state.wrongBook.some(w=>w.en===word.en&&w.cn===word.cn); const item=document.createElement('div'); item.className='result-item'; item.innerHTML=`<div><strong>${escapeHtml(word.en)}</strong><div class="small">${escapeHtml(word.cn)}</div></div><button data-bookmark="${word.id}" ${exists?'disabled':''}>${exists?'已在错题本':'加入错题本'}</button>`; list.appendChild(item); } board.querySelectorAll('[data-bookmark]').forEach(btn=>btn.onclick=()=>{ const word=ws.find(w=>w.id===btn.dataset.bookmark); if(word&&!state.wrongBook.some(w=>w.en===word.en&&w.cn===word.cn)){ state.wrongBook.push({id:uid(),en:word.en,cn:word.cn}); saveState(); showFinalResult(); render(); } }); }
function switchScope(scope){ activeScope=scope; selectedIds.clear(); revealedId=null; currentTest=null; editingWord=null; showMsg(scope==='library'?'当前是单词库。':'当前是错题本。'); render(); }
function resetProgress(){ if(!confirm('确定重置当前范围的测试进度吗？单词不会删除。')) return; state.sessions[scopeKey()]={testedIds:[],results:{}}; selectedIds.clear(); saveState(); render(); showMsg('当前范围的测试进度已经重置。'); }
function newLibrary(){ const name=prompt('新词库名称：','新词库'); if(!name) return; const id='lib_'+uid(); state.libraries.push({id,name:name.trim(),words:[]}); state.activeLibraryId=id; activeScope='library'; state.sessions[id]={testedIds:[],results:{}}; saveState(); render(); showMsg('新词库已创建。'); }
function renameLibrary(){ const lib=activeLibrary(); const name=prompt('新的词库名称：',lib.name); if(!name) return; lib.name=name.trim(); saveState(); render(); showMsg('词库已重命名。'); }
function deleteLibrary(){ if(state.libraries.length<=1) return; const lib=activeLibrary(); if(!confirm(`确定删除「${lib.name}」吗？里面的单词也会删除。`)) return; delete state.sessions[lib.id]; state.libraries=state.libraries.filter(l=>l.id!==lib.id); state.activeLibraryId=state.libraries[0].id; selectedIds.clear(); saveState(); render(); showMsg('词库已删除。'); }
function exportSave(){ const blob=new Blob([JSON.stringify(state,null,2)],{type:'application/json'}); const url=URL.createObjectURL(blob); const a=document.createElement('a'); a.href=url; a.download='vocab-notebook-save-v4.json'; a.click(); URL.revokeObjectURL(url); }
function importSave(file){ const reader=new FileReader(); reader.onload=()=>{ try{ state=migrate(JSON.parse(reader.result)); saveState(); selectedIds.clear(); revealedId=null; currentTest=null; activeScope='library'; render(); showMsg('存档已经导入。'); }catch{ alert('这个存档文件无法读取。'); } }; reader.readAsText(file); }
function showMsg(msg){ const b=$('boardContent'); b.className='empty'; b.textContent=msg; }
function escapeHtml(text){ return String(text).replace(/[&<>'"]/g,ch=>({'&':'&amp;','<':'&lt;','>':'&gt;',"'":'&#39;','"':'&quot;'}[ch])); }
$('addWordBtn').onclick=addWord; $('toggleBatchBtn').onclick=toggleBatch; $('batchImportBtn').onclick=batchImport; $('batchClearBtn').onclick=()=>$('batchInput').value=''; $('manualStartBtn').onclick=startManualTest; $('randomStartBtn').onclick=startRandomTest; $('libraryTab').onclick=()=>switchScope('library'); $('wrongTab').onclick=()=>switchScope('wrongBook'); $('resetProgressBtn').onclick=resetProgress; $('exportBtn').onclick=exportSave; $('importBtn').onclick=()=>$('importFile').click(); $('importFile').onchange=e=>{ if(e.target.files[0]) importSave(e.target.files[0]); e.target.value=''; };
$('librarySelect').onchange=e=>{ state.activeLibraryId=e.target.value; activeScope='library'; selectedIds.clear(); revealedId=null; currentTest=null; saveState(); render(); showMsg('已切换词库。'); };
$('newLibraryBtn').onclick=newLibrary; $('renameLibraryBtn').onclick=renameLibrary; $('deleteLibraryBtn').onclick=deleteLibrary; $('sortSelect').onchange=e=>{ state.sortMode=e.target.value; saveState(); renderWordList(); }; $('layoutSelect').onchange=e=>{ state.boardLayout=e.target.value; saveState(); if(currentTest){ currentTest.layout=e.target.value; if(e.target.value==='scatter') currentTest.positions=makeScatterPositions(currentTest.ids); renderTestBoard(); } };
render();
</script>
</body>
